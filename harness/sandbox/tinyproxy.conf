User tinyproxy
Group tinyproxy
Port 8888

Timeout 600

DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatFile "/usr/share/tinyproxy/stats.html"

LogLevel Info
LogFile "/dev/stdout"

# Listen on all interfaces; restrict via Allow lines.
Listen 0.0.0.0

# Allow connections from the agent network. The internal docker network we
# create uses 172.x; we allow private ranges and rely on FilterDefaultDeny
# plus the filter list for the upstream restriction.
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16

# Allow CONNECT to HTTPS only.
ConnectPort 443

# Whitelist mode: only domains in /etc/tinyproxy/filter are allowed.
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterExtended Yes
FilterCaseSensitive No
FilterURLs Off
